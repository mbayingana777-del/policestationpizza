<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Police Station Pizza | Ambridge, PA</title>
  <meta name="description" content="Legendary square-cut Ohio Valley pizza in Ambridge, PA. Thick crust, tangy sauce, and cheese added after baking.">

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #f0ebe6;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      background: #0a0a0a;
    }

    .hero-copy {
      padding: 80px;
    }

    .hero-eyebrow {
      color: #e05040;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 64px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero h1 em {
      color: #e05040;
      font-style: normal;
    }

    .hero-sub {
      color: #aaa;
      margin-bottom: 30px;
      max-width: 500px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      margin-right: 10px;
    }

    .btn-green {
      background: #c8321a;
      color: white;
    }

    .btn-outline {
      border: 2px solid white;
      color: white;
    }

    .hero-image {
      position: relative;
      overflow: hidden;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-badge {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: #c8321a;
      padding: 15px 20px;
      border-radius: 12px;
    }

    .hero-badge .price {
      font-size: 24px;
      font-weight: bold;
    }

    .hero-badge .label {
      font-size: 12px;
    }

    @media(max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-copy {
        padding: 40px 20px;
      }

      .hero h1 {
        font-size: 42px;
      }

      .hero-image {
        height: 300px;
      }
    }
  </style>
</head>

<body>

<!-- HERO (FINAL COMBINED VERSION) -->
<section class="hero">

  <div class="hero-copy">
    <div class="hero-eyebrow">The Ambridge Legend</div>

    <h1>
      Legendary Square Cut Pizza<br>
      <em>done right.</em>
    </h1>

    <p class="hero-sub">
      Thick crust. Tangy sauce. Cheese layered on top after baking. 
      This is Ohio Valley style pizza — and once you try it, nothing else compares.
    </p>

    <a href="#" class="btn btn-green">See Menu</a>
    <a href="tel:7242669559" class="btn btn-outline">Call to Order</a>
  </div>

  <div class="hero-image">
    <!-- 🔥 YOUR IMAGE GOES HERE -->
    <img src="assets/pizza-hero.jpg" alt="Square cut pizza tray">

    <div class="hero-badge">
      <div class="price">Fresh</div>
      <div class="label">Square Cut Trays</div>
    </div>
  </div>

</section>

</body>
</html>
